name: CI/CD Pipeline

on:
  push:
    branches: [ dev ]  # dev 브랜치에 push가 발생하면 실행

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3  # 코드 체크아웃

      - name: Set up JDK 17  # JDK 설정
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create application-dev_develop.yml  # application-dev_develop.yml 파일 생성
        run: |
          mkdir -p src/main/resources
          echo "
          spring:
            profiles:
              active: dev
            datasource:
              url: jdbc:mysql://${{ secrets.RDS_ENDPOINT }}:${{ secrets.RDS_PORT }}/${{ secrets.RDS_DATABASE }}
              username: ${{ secrets.RDS_USERNAME }}
              password: ${{ secrets.RDS_PASSWORD }}
              driver-class-name: com.mysql.cj.jdbc.Driver
            jpa:
              hibernate:
                ddl-auto: update
              properties:
                hibernate:
                  dialect: org.hibernate.dialect.MySQL8Dialect
          " > src/main/resources/application-dev_develop.yml

      - name: Grant execute permission for gradlew  # gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: Build with Gradle  # Gradle로 빌드
        uses: gradle/gradle-build-action@v2
        with:
          arguments: build

      - name: Upload build artifact  # 빌드 아티팩트 업로드
        uses: actions/upload-artifact@v3
        with:
          name: WeggServer
          path: build/libs/*.jar

  deploy:
    needs: build  # build 작업이 완료된 후 실행
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact  # 빌드 아티팩트 다운로드
        uses: actions/download-artifact@v3
        with:
          name: WeggServer
          path: build/libs/

      - name: Deploy to EC2  # EC2 배포
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$EC2_SSH_KEY" > private_key.pem
          chmod 600 private_key.pem
          jar_file=$(find build/libs -name '*.jar' ! -name '*plain.jar' | head -n 1)
          scp -i private_key.pem -o StrictHostKeyChecking=no "$jar_file" $EC2_USERNAME@$EC2_HOST:/home/$EC2_USERNAME/WeggServer.jar
          ssh -i private_key.pem -o StrictHostKeyChecking=no $EC2_USERNAME@$EC2_HOST "
            pgrep java | xargs -r kill -15  # 실행 중인 Java 프로세스 종료
            nohup java -jar /home/$EC2_USERNAME/WeggServer.jar > /home/$EC2_USERNAME/app.log 2>&1 &
          "
          rm -f private_key.pem
