name: CI/CD Pipeline

on:
  push:
    branches: [ dev ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make application.yml
        run: |
          cd ./src/main/resources
          echo "${{ secrets.APPLICATION_YML }}" > ./application.yml

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: build --info

      - name: Compress JAR file
        run: |
          cd build/libs
          jar_file=$(ls *.jar | grep -v 'plain')
          tar -czvf weggServer.tar.gz "$jar_file"

      - name: Upload compressed artifact
        uses: actions/upload-artifact@v4
        with:
          name: weggServer
          path: build/libs/weggServer.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: weggServer
          path: build/libs/

      - name: Deploy to EC2 (Fast Transfer)
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$EC2_SSH_KEY" > private_key.pem
          chmod 600 private_key.pem

          # 압축된 파일 전송 (SCP 대신 RSYNC 사용)
          rsync -avz -e "ssh -i private_key.pem -o StrictHostKeyChecking=no" \
          build/libs/weggServer.tar.gz $EC2_USERNAME@$EC2_HOST:/home/$EC2_USERNAME/

          # EC2에서 직접 압축 해제 및 재시작
          ssh -i private_key.pem -o StrictHostKeyChecking=no $EC2_USERNAME@$EC2_HOST << 'EOF'
            cd /home/$EC2_USERNAME
            tar -xzvf weggServer.tar.gz
            jar_file=$(ls *.jar | grep -v 'plain')
            mv "$jar_file" weggServer.jar

            sudo systemctl stop weggServer
            sudo systemctl start weggServer
            echo "Deployment completed"
          EOF

          rm -f private_key.pem