server:
  servlet:
    session:
      cookie:
        secure: false
        http-only: true
        same-site: Lax
        name: JSESSIONID
      tracking-modes: cookie

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wegg
    username: [username]
    password: [password]
  sql:
    init:
      mode: never
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-authentication-method: client_secret_post
            client-id: [client-id]
            client-secret: [client-secret]
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            scope: profile_nickname
            client-name: Kakao
          naver:
            client-id: [client-id]
            client-secret: [client-secret]
            redirect-uri: http://localhost:8080/login/oauth2/code/naver
            authorization-grant-type: authorization_code
            scope:
              - name
            client-name: Naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        show_sql: true
        format_sql: true
        use_sql_comments: true
        hbm2ddl:
          auto: update
        default_batch_fetch_size: 1000

logging:
  level:
    # Spring Web 및 DispatcherServlet 로그
    org.springframework.web.servlet.DispatcherServlet: TRACE
    org.springframework.web: DEBUG

    # Hibernate SQL 및 매핑 로그
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.engine.query.spi.QueryPlanCache: TRACE

    # Hibernate Validator (유효성 검사 상세 로그)
    org.hibernate.validator: TRACE
    org.springframework.validation: TRACE

    # Spring Security 로그 (필요한 경우)
    org.springframework.security: DEBUG
    org.springframework.security.web.session: TRACE
    org.springframework.security.oauth2 : DEBUG

